spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/mentaro}
    username: ${DB_USERNAME:mentaro}
    password: ${DB_PASSWORD:mentaro}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      # 20MB resulto corto para un PDF real con imagenes (problema
      # detectado probando: un documento de 23MB reseteaba la conexion a
      # mitad de la subida en vez de un error HTTP limpio). El costo de IA
      # ya esta acotado aparte por el limite de 30 imagenes descritas por
      # documento (ver DescriptorImagenesPdf), asi que un limite de tamano
      # mas generoso aca no dispara mas gasto por si solo.
      max-file-size: ${DOCUMENTO_TAMANO_MAXIMO:50MB}
      max-request-size: ${DOCUMENTO_TAMANO_MAXIMO:50MB}

server:
  port: ${PORT:8080}
  error:
    # Por defecto Boot oculta el mensaje de la excepcion en la respuesta
    # (solo deja status/error/path) - sin esto, un ResponseStatusException
    # con un motivo claro (ej. "PDF sin capa de texto") no se puede ver sin
    # ir a buscar el log del backend a mano.
    include-message: always

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  firebase:
    credentials-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
  sesion:
    tamano: ${SESION_TAMANO:8}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    modelo-pasada-a: ${DEEPSEEK_MODELO_PASADA_A:deepseek-v4-flash}
    modelo-pasada-b: ${DEEPSEEK_MODELO_PASADA_B:deepseek-v4-flash}
    modelo-pasada-b-escalado: ${DEEPSEEK_MODELO_PASADA_B_ESCALADO:deepseek-v4-pro}
    timeout-conexion: ${DEEPSEEK_TIMEOUT_CONEXION:PT10S}
    timeout-lectura: ${DEEPSEEK_TIMEOUT_LECTURA:PT5M}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    modelo: ${ANTHROPIC_MODELO:claude-haiku-4-5-20251001}
    timeout-conexion: ${ANTHROPIC_TIMEOUT_CONEXION:PT10S}
    timeout-lectura: ${ANTHROPIC_TIMEOUT_LECTURA:PT1M}
